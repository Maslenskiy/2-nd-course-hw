<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добро пожаловать на мой сайт !</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header__content">
                <h1 class="header__h1">Добро пожаловать<br> на мой сайт !</h1>
                <div class="header_text-mobile">
                    <p class="header__text">Вам предстоит пройти несколько увлекательных игр. Если готов нажимай <span class="header__text-color">поехали</span> и <span class="header__text-color">приступай</span></p>
                </div>
                <div class="mobile_btn">
                    <button class="header__button">Поехали!</button>
                </div>
            </div>
        </div>
    </header>
    <article class="cart">
        <div class="container">
            <div class="cart__content">
                <div class="cart__item cart__bg-1">
                    <h6 class="cart__h6">Игра 1</h6>
                </div>
                <div class="cart__item cart__bg-2">
                    <h6 class="cart__h6">Игра 2</h6>
                </div>
                <div class="cart__item cart__bg-3">
                    <h6 class="cart__h6">Игра 3</h6>
                </div>
            </div>
        </div>
    </article>

    <article class="seasons">
        <div class="container">
            <div class="seasons__content">
                <div class="seasons__left">
                    <h2 class="seasons__title">Времена года!</h2>
                    <p class="seasons__text">Нажмите кнопку играть, введите номер месяца (от 1 до 12) и вы узнаете к какому времени года он относится</p>
                    <div class="seasons__button">
                        <button class="seasons__btn" onclick="play()" ">Играть!</button>
                    </div>
                </div>
                <div class="seasons__right">
                    <img class="seasons__img" src="img/game.svg" alt="game">
                </div>
            </div>
        </div>
    </article>
    <script src="hw-2.5.js"></script>
</body>
</html>
